[pytest]
# Pytest configuration for unsupervised machine learning tests

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 3.8

# Additional options
addopts =
    --verbose
    --strict-markers
    --tb=short
    --disable-warnings

# Markers for categorizing tests
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    clustering: tests for clustering algorithms
    dimensionality: tests for dimensionality reduction
    generative: tests for generative models
    recommenders: tests for recommender systems

# Coverage options (when pytest-cov is installed)
# Run with: pytest --cov=src --cov-report=html
[coverage:run]
source = src
omit = */tests/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    pytest.skip
